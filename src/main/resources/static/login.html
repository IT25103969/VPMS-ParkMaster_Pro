<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkMaster Pro | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
        .dark .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4 text-white">

    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <div class="absolute top-8 right-8">
        <button onclick="toggleDarkMode()" class="glass p-3 rounded-2xl dark:text-white transition-all hover:scale-110">
            <i data-lucide="sun" class="hidden dark:block w-6 h-6"></i>
            <i data-lucide="moon" class="block dark:hidden w-6 h-6"></i>
        </button>
    </div>

    <div class="glass w-full max-w-md rounded-3xl p-8 shadow-2xl border border-white/30">
        <div class="text-center mb-8">
            <div class="bg-white/20 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white shadow-lg backdrop-blur-md border border-white/30">
                <i data-lucide="car" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">ParkMaster Pro</h1>
            <p class="text-white/80 mt-2">Secure access to your system</p>
        </div>

        <div class="flex bg-black/10 p-1 rounded-xl mb-8">
            <button id="tab-admin" onclick="switchRole('ADMIN')" class="flex-1 py-2.5 rounded-lg text-sm font-bold transition-all text-white bg-white/20 shadow-sm">Admin</button>
            <button id="tab-staff" onclick="switchRole('STAFF')" class="flex-1 py-2.5 rounded-lg text-sm font-bold transition-all text-white/60 hover:text-white">Staff</button>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-white/90">Username</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/70"></i>
                    <input type="text" id="username" required 
                        class="w-full glass bg-white/10 border-white/20 pl-12 pr-4 py-3.5 rounded-xl text-white placeholder-white/50 focus:bg-white/20 focus:ring-2 focus:ring-white/50 outline-none transition-all"
                        placeholder="Enter your username">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-semibold text-white/90">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/70"></i>
                    <input type="password" id="password" required 
                        class="w-full glass bg-white/10 border-white/20 pl-12 pr-4 py-3.5 rounded-xl text-white placeholder-white/50 focus:bg-white/20 focus:ring-2 focus:ring-white/50 outline-none transition-all"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full bg-white text-indigo-600 dark:bg-indigo-600 dark:text-white py-4 rounded-xl font-bold text-lg hover:bg-opacity-90 transition-all shadow-xl active:scale-[0.98]">
                Sign In
            </button>
        </form>
    </div>

    <script>
        let currentRole = 'ADMIN';

        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            lucide.createIcons();
        }

        function switchRole(role) {
            currentRole = role;
            const adminTab = document.getElementById('tab-admin');
            const staffTab = document.getElementById('tab-staff');
            if (role === 'ADMIN') {
                adminTab.classList.add('bg-white/20', 'text-white', 'shadow-sm');
                adminTab.classList.remove('text-white/60');
                staffTab.classList.remove('bg-white/20', 'text-white', 'shadow-sm');
                staffTab.classList.add('text-white/60');
            } else {
                staffTab.classList.add('bg-white/20', 'text-white', 'shadow-sm');
                staffTab.classList.remove('text-white/60');
                adminTab.classList.remove('bg-white/20', 'text-white', 'shadow-sm');
                adminTab.classList.add('text-white/60');
            }
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const swalConfig = { background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff', color: document.documentElement.classList.contains('dark') ? '#fff' : '#000' };

            try {
                const endpoint = currentRole === 'ADMIN' ? '/api/auth/login' : '/api/staff/login';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('role', data.role);
                    sessionStorage.setItem('userId', data.id);
                    sessionStorage.setItem('userName', data.name);
                    
                    let tabs = data.accessibleTabs;
                    if (data.role === 'ADMIN') {
                        tabs = ['dashboard', 'slots', 'history', 'membership', 'settings'];
                    } else if (!tabs || tabs.length === 0) {
                        // For staff, if none are assigned, we can default to dashboard ONLY to be safe
                        // or just leave it empty. Let's default to dashboard so they aren't stuck.
                        tabs = ['dashboard']; 
                    }
                    sessionStorage.setItem('accessibleTabs', JSON.stringify(tabs));
                    
                    Swal.fire({ ...swalConfig, icon: 'success', title: 'Success', text: 'Welcome back!', timer: 1000, showConfirmButton: false }).then(() => {
                        window.location.href = 'index.html';
                    });
                } else {
                    Swal.fire({ ...swalConfig, icon: 'error', title: 'Login Failed', text: 'Invalid username or password' });
                }
            } catch (err) {
                Swal.fire({ ...swalConfig, icon: 'error', title: 'Error', text: 'Connection failed' });
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
