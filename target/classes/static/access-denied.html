<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkMaster Pro | Access Denied</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-['Inter']">
    <div class="max-w-md w-full text-center space-y-8 bg-white p-12 rounded-3xl shadow-xl border border-red-100">
        <div class="bg-red-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto text-red-600">
            <i data-lucide="shield-alert" class="w-12 h-12"></i>
        </div>
        <div>
            <h1 class="text-4xl font-black text-slate-800 mb-2 tracking-tight">403 Forbidden</h1>
            <p class="text-slate-500 font-medium">You don't have permission to access this page.</p>
        </div>
        <div class="pt-4">
            <button onclick="window.history.back()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-black transition-all shadow-lg flex items-center justify-center space-x-2 mx-auto">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span>Go Back</span>
            </button>
        </div>
        <p class="text-xs text-slate-400">If you believe this is an error, please contact your administrator.</p>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
