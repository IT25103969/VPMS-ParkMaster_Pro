<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkMaster Pro | Member Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (sessionStorage.getItem('role') !== 'MEMBER') { window.location.href = 'login.html'; }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .dark .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .sidebar-item { cursor: pointer; transition: all 0.3s; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-item.active { background: #3b82f6; color: white; }
        .parking-slot { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex dark:text-slate-200">

    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <!-- Sidebar -->
    <aside class="w-64 glass border-r h-screen sticky top-0 flex flex-col p-6 space-y-8 hidden md:flex dark:border-slate-800">
        <div class="flex items-center space-x-3 px-2">
            <div class="bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="car"></i></div>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white tracking-tight">ParkMaster</h1>
        </div>

        <nav class="flex-1 space-y-1">
            <div onclick="switchTab('booking')" id="nav-booking" class="sidebar-item active flex items-center space-x-3 p-3 rounded-xl">
                <i data-lucide="calendar-check" class="w-5 h-5"></i>
                <span class="font-medium">Slot Booking</span>
            </div>
            <div onclick="switchTab('account')" id="nav-account" class="sidebar-item flex items-center space-x-3 p-3 rounded-xl text-gray-500 dark:text-slate-400">
                <i data-lucide="user-cog" class="w-5 h-5"></i>
                <span class="font-medium">Account Settings</span>
            </div>
        </nav>

        <div class="bg-blue-50 dark:bg-slate-800/50 p-4 rounded-2xl border border-blue-100 dark:border-slate-700">
            <p class="text-xs font-semibold text-blue-800 dark:text-blue-400 mb-1" id="member-name-sidebar">Store Owner</p>
            <button onclick="toggleDarkMode()" class="w-full flex items-center justify-center space-x-2 bg-white dark:bg-slate-700 py-2 rounded-lg text-xs font-bold shadow-sm border dark:border-slate-600 mb-2 transition-all">
                <i data-lucide="sun" class="hidden dark:block w-4 h-4"></i>
                <i data-lucide="moon" class="block dark:hidden w-4 h-4"></i>
                <span class="dark:hidden">Dark Mode</span>
                <span class="hidden dark:block">Light Mode</span>
            </button>
            <button onclick="logout()" class="w-full bg-gray-200 dark:bg-slate-700 text-gray-800 dark:text-slate-200 py-2 rounded-lg text-xs font-bold hover:bg-gray-300 dark:hover:bg-slate-600 transition-colors">Sign Out</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-4 md:p-8 space-y-8 max-w-7xl mx-auto overflow-y-auto">
        
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h2 id="page-title" class="text-2xl font-bold text-gray-800 dark:text-white">Your Parking Slot</h2>
                <p id="page-subtitle" class="text-gray-500 dark:text-slate-400">Allocate your dedicated parking space.</p>
            </div>
            <div class="glass px-6 py-2 rounded-2xl border border-white dark:border-slate-700 flex items-center space-x-4">
                <div class="text-right">
                    <p class="text-[10px] uppercase font-bold text-gray-400 dark:text-slate-500">Monthly Cycle</p>
                    <p class="text-sm font-bold text-blue-600 dark:text-blue-400">1st - 30th</p>
                </div>
                <div class="h-8 w-px bg-gray-200 dark:bg-slate-700"></div>
                <div class="text-right">
                    <p class="text-[10px] uppercase font-bold text-gray-400 dark:text-slate-500">Estimated Fee</p>
                    <p id="cycle-fee" class="text-sm font-bold text-green-600 dark:text-green-400">$0.00</p>
                </div>
            </div>
        </header>

        <!-- Tab: Booking -->
        <div id="tab-booking" class="tab-content active space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 glass p-8 rounded-3xl shadow-sm border border-white">
                    <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-6">Available Slots</h3>
                    <div id="member-grid" class="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-4"></div>
                </div>
                <div class="glass p-8 rounded-3xl shadow-sm border border-white">
                    <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-6">Your Allocation</h3>
                    <div id="allocated-slot-info" class="text-center py-10">
                        <div class="bg-gray-100 dark:bg-slate-800 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-400">
                            <i data-lucide="parking-circle" class="w-10 h-10"></i>
                        </div>
                        <p class="text-gray-500 dark:text-slate-400">No slot allocated yet.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Account -->
        <div id="tab-account" class="tab-content space-y-8">
            <div class="max-w-md mx-auto glass p-8 rounded-3xl shadow-sm border border-white">
                <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-6">Security Settings</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1">New Password</label>
                        <input type="password" id="new-password" class="w-full glass px-4 py-3 rounded-xl outline-none dark:text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1">Confirm New Password</label>
                        <input type="password" id="confirm-password" class="w-full glass px-4 py-3 rounded-xl outline-none dark:text-white">
                    </div>
                    <button onclick="updatePassword()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all">Change Password</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const API_BASE = '/api';
        const memberId = sessionStorage.getItem('userId');
        const memberName = sessionStorage.getItem('userName');
        document.getElementById('member-name-sidebar').textContent = memberName;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active', 'text-gray-500', 'dark:text-slate-400'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active');
            document.querySelectorAll('.sidebar-item:not(.active)').forEach(i => i.classList.add('text-gray-500', 'dark:text-slate-400'));
            
            const titles = {
                booking: ['Your Parking Slot', 'Allocate your dedicated parking space.'],
                account: ['Account Security', 'Manage your password and access.']
            };
            document.getElementById('page-title').textContent = titles[tabId][0];
            document.getElementById('page-subtitle').textContent = titles[tabId][1];
            loadData();
        }

        async function loadData() {
            try {
                const [slotsRes, feeRes] = await Promise.all([
                    fetch(`${API_BASE}/slots`),
                    fetch(`${API_BASE}/members/${memberId}/fee`)
                ]);
                const slots = await slotsRes.json();
                const feeData = await feeRes.json();

                document.getElementById('cycle-fee').textContent = `$${feeData.fee.toFixed(2)}`;
                renderGrid(slots);
                renderMySlot(slots);
                lucide.createIcons();
            } catch (err) { console.error(err); }
        }

        function renderGrid(slots) {
            const grid = document.getElementById('member-grid');
            grid.innerHTML = slots.map(slot => {
                const isMine = slot.memberId == memberId;
                const statusColor = slot.occupied ? 'bg-red-400 opacity-50 cursor-not-allowed' : (slot.bookedByMember ? (isMine ? 'bg-blue-600 shadow-lg ring-2 ring-blue-300' : 'bg-blue-300 opacity-50 cursor-not-allowed') : 'bg-green-500 hover:scale-105 cursor-pointer');
                return `
                    <div onclick="${(!slot.occupied && !slot.bookedByMember) || isMine ? `toggleBooking(${slot.id}, ${isMine})` : ''}" 
                         class="parking-slot h-12 ${statusColor} rounded-xl flex items-center justify-center text-white transition-all">
                        <span class="text-xs font-bold">${isMine ? '<i data-lucide="check-circle" class="w-5 h-5 text-white"></i>' : slot.slotNumber}</span>
                    </div>
                `;
            }).join('');
        }

        function renderMySlot(slots) {
            const mySlot = slots.find(s => s.memberId == memberId);
            const container = document.getElementById('allocated-slot-info');
            if (mySlot) {
                container.innerHTML = `
                    <div class="bg-blue-100 dark:bg-blue-900/30 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600 dark:text-blue-400">
                        <i data-lucide="parking-circle" class="w-10 h-10"></i>
                    </div>
                    <h4 class="text-2xl font-black text-gray-800 dark:text-white">SLOT ${mySlot.slotNumber}</h4>
                    <p class="text-blue-600 dark:text-blue-400 font-bold mt-1">ALLOCATED</p>
                    <button onclick="toggleBooking(${mySlot.id}, true)" class="mt-6 text-red-500 text-sm font-bold hover:underline">Release Slot</button>
                `;
            } else {
                container.innerHTML = `
                    <div class="bg-gray-100 dark:bg-slate-800 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-400">
                        <i data-lucide="parking-circle" class="w-10 h-10"></i>
                    </div>
                    <p class="text-gray-500 dark:text-slate-400">No slot allocated yet.</p>
                `;
            }
        }

        async function toggleBooking(slotId, isCurrentlyBooked) {
            const endpoint = isCurrentlyBooked ? `${API_BASE}/members/unbook/${slotId}/${memberId}` : `${API_BASE}/members/book/${slotId}/${memberId}`;
            const res = await fetch(endpoint, { method: 'POST' });
            if (res.ok) {
                Swal.fire({ icon: 'success', title: isCurrentlyBooked ? 'Slot Released' : 'Slot Allocated', timer: 1000, showConfirmButton: false, background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff', color: document.documentElement.classList.contains('dark') ? '#fff' : '#000' });
                loadData();
            } else {
                Swal.fire({ title: 'Error', text: await res.text(), icon: 'error', background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff', color: document.documentElement.classList.contains('dark') ? '#fff' : '#000' });
            }
        }

        async function updatePassword() {
            const pass = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const swalConfig = { background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff', color: document.documentElement.classList.contains('dark') ? '#fff' : '#000' };
            
            if (pass !== confirm) return Swal.fire({ ...swalConfig, icon: 'error', title: 'Error', text: 'Passwords do not match' });
            if (pass.length < 4) return Swal.fire({ ...swalConfig, icon: 'error', title: 'Error', text: 'Password too short' });

            const res = await fetch(`${API_BASE}/members/${memberId}/change-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            });
            if (res.ok) {
                Swal.fire({ ...swalConfig, icon: 'success', title: 'Success', text: 'Password updated successfully!' });
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
            }
        }

        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            lucide.createIcons();
        }

        function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

        loadData();
        lucide.createIcons();
    </script>
</body>
</html>
